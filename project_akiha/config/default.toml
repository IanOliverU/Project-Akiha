[pet_window]
width = 180
height = 220
frames_per_second = 24
start_x = 120
start_y = 120
always_on_top = true
animation_manifest_path = "assets/animations/manifest.toml"
walking_speed_pixels = 2

[ai]
provider = "mock"
ollama_base_url = "http://localhost:11434"
ollama_model = "llama3.2"
request_timeout_seconds = 60

[personality]
character_name = "Akiha"
system_prompt = "You are {character_name}, a warm, concise desktop companion. Be helpful, friendly, and direct. Keep replies grounded in what the user asked for, and do not claim abilities the app has not built yet."

[memory]
enabled = true
